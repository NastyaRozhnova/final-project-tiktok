syntax = "proto3";

package tiktok.identity;

option csharp_namespace = "TikTokFeed.Contracts.Grpc.Identity";

// Identity Service = User Service
service IdentityService {
  rpc GetUser       (GetUserRequest)       returns (UserProto);
  rpc ValidateToken (ValidateTokenRequest) returns (TokenValidationProto);
  rpc GetFollowing  (GetFollowingRequest)  returns (FollowingProto);
}

message GetUserRequest       { string user_id = 1; }
message ValidateTokenRequest { string token   = 1; }
message GetFollowingRequest  { string user_id = 1; }

message FollowingProto { repeated string following_ids = 1; }

message UserProto {
  string user_id    = 1;
  string username   = 2;
  bool   is_creator = 3;
}

message TokenValidationProto {
  bool   is_valid = 1;
  string user_id  = 2;
}
