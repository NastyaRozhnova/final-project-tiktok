syntax = "proto3";

package tiktok.engagement;

option csharp_namespace = "TikTokFeed.Contracts.Grpc.Engagement";

// Engagement Service = Interaction Service + Feed Service from stage 2.
// Synchronous calls used by Content Service for honest stats.
service EngagementService {
  rpc GetVideoStats       (GetVideoStatsRequest)       returns (VideoStatsProto);
  rpc GetUserInteractions (GetUserInteractionsRequest) returns (InteractionsProto);
}

message GetVideoStatsRequest       { string video_id = 1; }
message GetUserInteractionsRequest { string user_id  = 1; }

message VideoStatsProto {
  string video_id       = 1;
  int64  views_count    = 2;
  int64  likes_count    = 3;
  int64  comments_count = 4;
  int64  reposts_count  = 5;
}

message InteractionsProto {
  repeated string liked_video_ids  = 1;
  repeated string viewed_video_ids = 2;
}
